services:
  api:
    build:
      context: .
      args:
        BASE_IMAGE: docker.m.daocloud.io/library/python:3.12-slim
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

